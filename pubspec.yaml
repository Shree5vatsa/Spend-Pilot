name: spend_pilot
description: "Smart expense tracking with AI-powered group splits"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.10

  # State Management
  hooks_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^17.2.2

  # Local Storage (Phase 1)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts & Visualization (Phase 1)
  fl_chart: ^1.2.0
  intl: ^0.20.2

  # Utilities (Phase 1)
  image_picker: ^1.1.2

  # Firebase (Phase 2)
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0

  # AI (Phase 3)
  google_generative_ai: ^0.4.6

  # Forms & Validation
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

# Flutter specific configuration
flutter:
  uses-material-design: true

  # Assets
#  assets:
#    - assets/icons/
#    - assets/images/
#    - assets/animations/

  # Fonts (optional - uncomment if you add custom fonts)
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700